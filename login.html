<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Buddy Finder — Log In</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <!-- ── Navigation ── -->
  <nav class="navbar navbar-light bg-white border-bottom px-3">
    <a class="navbar-brand fw-bold" href="index.html">📚 Study Buddy Finder</a>
    <div class="d-flex align-items-center gap-2">
      <span id="nav-user" class="text-muted small"></span>
      <button class="btn btn-outline-danger btn-sm" id="logout-btn"
              style="display:none" onclick="doLogout()">Log Out</button>
    </div>
  </nav>

  <!-- ── Login Card ── -->
  <main class="flex-grow-1 d-flex align-items-start justify-content-center pt-5">
    <div class="card shadow-sm border" style="max-width: 420px; width: 100%;">
      <div class="card-body p-4">
        <h2 class="card-title h4 mb-1">Welcome back</h2>
        <p class="text-muted small mb-4">Log in to access your study groups</p>

        <!-- Alert banner -->
        <div id="login-alert" class="alert d-none" role="alert"></div>

        <!-- Email -->
        <div class="mb-3">
          <label for="login-email" class="form-label">Student Email</label>
          <input type="email" class="form-control" id="login-email"
                 placeholder="you@university.edu" oninput="clearFieldError(this)" />
          <div class="form-text text-danger mt-1 d-none" id="login-email-msg"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="login-password"
                 placeholder="Enter your password" oninput="clearFieldError(this)" />
          <div class="form-text text-danger mt-1 d-none" id="login-password-msg"></div>
        </div>

        <button class="btn btn-primary w-100 mt-1" onclick="doLogin()">Log In</button>

        <p class="text-center text-muted small mt-3 mb-0">
          Don't have an account? <a href="signup.html">Sign up</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Demo credentials (replace with real backend call later)
    const DEMO = { email: 'student@university.edu', password: 'Pass1234' };

    function doLogin() {
      clearAlert('login-alert');
      const emailEl = document.getElementById('login-email');
      const passEl  = document.getElementById('login-password');
      let ok = true;

      // Validate email
      if (!emailEl.value.trim()) {
        setFieldError(emailEl, 'login-email-msg', 'Email is required');
        ok = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        setFieldError(emailEl, 'login-email-msg', 'Enter a valid email address');
        ok = false;
      }

      // Validate password
      if (!passEl.value) {
        setFieldError(passEl, 'login-password-msg', 'Password is required');
        ok = false;
      }

      if (!ok) return;

      // Simulate authentication check
      if (emailEl.value === DEMO.email && passEl.value === DEMO.password) {
        showAlert('login-alert', 'success', '✅ Login successful! Redirecting...');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      } else {
        showAlert('login-alert', 'danger',
          'Incorrect email or password. Try: student@university.edu / Pass1234');
      }
    }

    function doLogout() {
      document.getElementById('nav-user').textContent = '';
      document.getElementById('logout-btn').style.display = 'none';
    }

    // ── Shared helpers ──────────────────────────────────
    function showAlert(id, type, msg) {
      const el = document.getElementById(id);
      el.className = 'alert alert-' + type;
      el.textContent = msg;
    }

    function clearAlert(id) {
      const el = document.getElementById(id);
      el.className = 'alert d-none';
      el.textContent = '';
    }

    function setFieldError(inputEl, msgId, msg) {
      inputEl.classList.add('is-invalid');
      const m = document.getElementById(msgId);
      m.className = 'form-text text-danger mt-1';
      m.textContent = '⚠ ' + msg;
    }

    function clearFieldError(inputEl) {
      inputEl.classList.remove('is-invalid');
      const msgEl = inputEl.parentElement.querySelector('.form-text');
      if (msgEl) {
        msgEl.className = 'form-text text-danger mt-1 d-none';
        msgEl.textContent = '';
      }
    }
  </script>

</body>
</html>
