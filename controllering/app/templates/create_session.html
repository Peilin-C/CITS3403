{% extends "base.html" %}

{% block content %}

<main>
  <div class="container" style="max-width:650px;margin:50px auto;padding-bottom:60px;">
    <div class="sb-card">
      <h1 class="page-title" style="margin-top:0;">Create Study Session</h1>
      <form method="POST" action="#">
        <div class="mb-3"><label class="form-label fw-semibold">Session Name</label><input type="text" class="form-control form-control-lg" name="name" placeholder="e.g. CITS3403 Exam Prep"/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Unit</label><input type="text" class="form-control form-control-lg" name="unit" placeholder="e.g. CITS3403"/></div>
        <div class="row"><div class="col-md-6 mb-3"><label class="form-label fw-semibold">Date</label><input type="date" class="form-control form-control-lg" name="date"/></div><div class="col-md-6 mb-3"><label class="form-label fw-semibold">Time</label><input type="time" class="form-control form-control-lg" name="time"/></div></div>
        <div class="mb-3"><label class="form-label fw-semibold">Location</label><input type="text" class="form-control form-control-lg" name="location" placeholder="Library / Online / EZONE..."/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Study Mode</label><select class="form-select form-select-lg" name="mode"><option>In Person</option><option>Online</option><option>Hybrid</option></select></div>
        <div class="mb-4"><label class="form-label fw-semibold">Max Participants</label><input type="number" class="form-control form-control-lg" name="max_participants" placeholder="e.g. 6" min="2" max="20"/></div>
        <div class="d-flex gap-3"><button type="submit" class="btn btn-success px-4 py-2"><i class="bi bi-plus-circle me-2"></i>Create Session</button><a href="study_sessions.html" class="btn btn-outline-secondary px-4 py-2">Cancel</a></div>
      </form>
    </div>
  </div>
</main>

{% endblock %}
