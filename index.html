
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Buddy Finder — Log In</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav>
    <span class="nav-brand">📚 Study Buddy Finder</span>
    <div class="nav-right">
      <!-- Logout button: shown only after login (controlled via JS) -->
      <span id="nav-user"></span>
      <button class="btn-logout" id="logout-btn" style="display:none" onclick="doLogout()">
        Log Out
      </button>
    </div>
  </nav>

  <!-- ── Login Card ── -->
  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Log in to access your courses</p>

    <!-- Alert banner: error or success messages appear here -->
    <div class="alert" id="login-alert"></div>

    <div class="form-group">
      <label for="login-email">Student Email</label>
      <input type="email" id="login-email" placeholder="you@university.edu"
             oninput="clearFieldError(this)" />
      <div class="field-msg" id="login-email-msg"></div>
    </div>

    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password"
             oninput="clearFieldError(this)" />
      <div class="field-msg" id="login-password-msg"></div>
    </div>

    <button class="btn-primary" onclick="doLogin()">Log In</button>

    <div class="switch-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script>
    // Demo credentials (replace with real backend call later)
    const DEMO = { email: 'student@university.edu', password: 'Pass1234' };

    function doLogin() {
      clearAlert('login-alert');
      const emailEl = document.getElementById('login-email');
      const passEl  = document.getElementById('login-password');
      let ok = true;

      // Validate email
      if (!emailEl.value.trim()) {
        setFieldError(emailEl, 'login-email-msg', 'Email is required');
        ok = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        setFieldError(emailEl, 'login-email-msg', 'Enter a valid email address');
        ok = false;
      }

      // Validate password
      if (!passEl.value) {
        setFieldError(passEl, 'login-password-msg', 'Password is required');
        ok = false;
      }

      if (!ok) return;

      // Simulate authentication check
      if (emailEl.value === DEMO.email && passEl.value === DEMO.password) {
        // TODO: replace with real backend auth
        showAlert('login-alert', 'success', '✅ Login successful! Redirecting...');
        setTimeout(() => {
          // Redirect to dashboard (your teammate's page)
          window.location.href = 'dashboard.html';
        }, 1200);
      } else {
        showAlert('login-alert', 'error',
          'Incorrect email or password. Try: student@university.edu / Pass1234');
      }
    }

    function doLogout() {
      document.getElementById('nav-user').textContent = '';
      document.getElementById('logout-btn').style.display = 'none';
    }

    // ── Shared helpers ──────────────────────────────────
    function showAlert(id, type, msg) {
      const el = document.getElementById(id);
      el.className = 'alert ' + type;
      el.textContent = msg;
    }
    function clearAlert(id) {
      const el = document.getElementById(id);
      el.className = 'alert';
      el.textContent = '';
    }
    function setFieldError(inputEl, msgId, msg) {
      inputEl.className = 'error';
      const m = document.getElementById(msgId);
      m.className = 'field-msg error';
      m.textContent = '⚠ ' + msg;
    }
    function clearFieldError(inputEl) {
      inputEl.className = '';
      const msgEl = inputEl.nextElementSibling;
      if (msgEl && msgEl.classList.contains('field-msg')) {
        msgEl.className = 'field-msg';
        msgEl.textContent = '';
      }
    }
  </script>

</body>
</html>
