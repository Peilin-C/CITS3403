{% extends "base.html" %}
{% block title %}Edit Profile — Study Buddy{% endblock %}

{% block content %}
<div class="container" style="max-width:780px; margin:50px auto; padding-bottom:60px;">
  <div class="sb-card">
    <h1 class="page-title" style="margin-top:0;">Edit Profile</h1>
    <form method="POST" action="{{ url_for('main.edit_profile') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Name</label>
        <input type="text" class="form-control form-control-lg" name="name" value="{{ user.name }}"/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Degree / Year</label>
        <input type="text" class="form-control form-control-lg" name="degree" value="{{ user.degree or '' }}" placeholder="e.g. Bachelor of Computer Science, Year 2"/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Units</label>
        <input type="text" class="form-control form-control-lg" name="units" value="{{ user.units or '' }}" placeholder="e.g. CITS3403, CITS3002"/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Availability</label>
        <input type="text" class="form-control form-control-lg" name="availability" value="{{ user.availability or '' }}" placeholder="e.g. Tuesday and Thursday afternoons"/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Study Style</label>
        <select class="form-select form-select-lg" name="study_style">
          <option value="">Select style</option>
          <option value="Group study" {{ 'selected' if user.study_style == 'Group study' }}>Group study</option>
          <option value="Quiet study" {{ 'selected' if user.study_style == 'Quiet study' }}>Quiet study</option>
          <option value="Online study" {{ 'selected' if user.study_style == 'Online study' }}>Online study</option>
          <option value="In-person study" {{ 'selected' if user.study_style == 'In-person study' }}>In-person study</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Study Preferences</label>
        <textarea class="form-control form-control-lg" name="study_preferences" rows="4">{{ user.study_preferences or '' }}</textarea>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Open to Project Team</label>
        <select class="form-select form-select-lg" name="open_to_teams">
          <option value="yes" {{ 'selected' if user.open_to_teams }}>Yes</option>
          <option value="no" {{ 'selected' if not user.open_to_teams }}>No</option>
        </select>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-primary px-4 py-2">Save Changes</button>
        <a href="{{ url_for('main.profile') }}" class="btn btn-outline-secondary px-4 py-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
