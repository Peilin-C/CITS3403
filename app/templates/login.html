{% extends "base.html" %}
{% block title %}Log In — Study Buddy{% endblock %}

{% block content %}
<div class="d-flex align-items-start justify-content-center pt-5 pb-5">
  <div class="card shadow-sm" style="max-width:450px;width:100%;border-radius:18px;padding:40px;border:1px solid rgba(26,31,94,0.06);">
    <h2 class="text-center" style="font-family:'Playfair Display',serif;color:#1a1f5e;margin-bottom:6px;">Welcome to Study Buddy</h2>
    <p class="text-muted mb-4 text-center" style="font-size:0.95rem;">Log in to access your study groups</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
      
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Student Email</label>
        <input type="email" class="form-control form-control-lg" id="email" name="email"
               placeholder="you@student.uwa.edu.au" required/>
      </div>

      <!-- Password toggle -->
      <div class="mb-4 position-relative">
        <label for="login-password" class="form-label fw-semibold">Password</label>

        <input type="password" class="form-control form-control-lg pe-5"
                id="login-password" name="password"
                placeholder="Enter your password"
                oninput="clearFieldError(this)" />

        <!-- Eye icon -->
        <i class="bi bi-eye-slash position-absolute"
            id="togglePassword"
            style="top: 55%; right: 15px; cursor: pointer; font-size: 1.2rem;"></i>

        <div class="form-text text-danger mt-1 d-none" id="login-password-msg"></div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2" style="font-size:1rem;">
        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
      </button>
    </form>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:0.9rem;">
      Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color:#1a1f5e;font-weight:600;">Sign up</a>
    </p>
  </div>
</div>

{% endblock %}
{% block extra_js %}
<script>
  const passwordInput = document.getElementById("login-password");
  const toggleIcon = document.getElementById("togglePassword");

  toggleIcon.addEventListener("click", () => {
    const isHidden = passwordInput.type === "password";

    passwordInput.type = isHidden ? "text" : "password";

    toggleIcon.classList.toggle("bi-eye");
    toggleIcon.classList.toggle("bi-eye-slash");
  });
</script>


{% endblock %}
