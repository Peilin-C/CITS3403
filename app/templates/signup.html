{% extends "base.html" %}
{% block title %}Sign Up — Study Buddy{% endblock %}

{% block content %}
<div class="d-flex align-items-start justify-content-center pt-5 pb-5">
  <div class="card shadow-sm" style="max-width:440px;width:100%;border-radius:18px;padding:40px;border:1px solid rgba(26,31,94,0.06);">
    <h2 style="font-family:'Playfair Display',serif;color:#1a1f5e;margin-bottom:6px;">Create an account</h2>
    <p class="text-muted mb-4" style="font-size:0.95rem;">Join and find your study buddies at UWA</p>

    <form method="POST" action="{{ url_for('auth.signup') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Full Name</label>
        <input type="text" class="form-control form-control-lg" id="name" name="name"
               placeholder="Jane Doe" required/>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Student Email</label>
        <input type="email" class="form-control form-control-lg" id="email" name="email"
               placeholder="you@student.uwa.edu.au" required/>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password</label>
      
        <div class="position-relative">
          <input type="password" class="form-control form-control-lg pe-5"
                 id="password" name="password"
                 placeholder="Min 8 characters" required minlength="8"/>
      
          <i class="bi bi-eye position-absolute toggle-password"
             data-target="password"
             style="top: 50%; right: 15px; transform: translateY(-50%); cursor: pointer;"></i>
        </div>
      </div>
      
      
      <div class="mb-4">
        <label for="confirm" class="form-label fw-semibold">Confirm Password</label>
      
        <div class="position-relative">
          <input type="password" class="form-control form-control-lg pe-5"
                 id="confirm" name="confirm"
                 placeholder="Re-enter your password" required/>
      
          <i class="bi bi-eye position-absolute toggle-password"
             data-target="confirm"
             style="top: 50%; right: 15px; transform: translateY(-50%); cursor: pointer;"></i>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2" style="font-size:1rem;">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
    </form>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:0.9rem;">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:#1a1f5e;font-weight:600;">Log in</a>
    </p>
  </div>
</div>

<!-- to make the password toggleable using an eye -->

{% endblock %}
{% block extra_js %}
<script>
  document.querySelectorAll(".toggle-password").forEach(icon => {
    icon.addEventListener("click", () => {
      const targetId = icon.getAttribute("data-target");
      const input = document.getElementById(targetId);

      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";

      icon.classList.toggle("bi-eye");
      icon.classList.toggle("bi-eye-slash");
    });
  });
</script>

{% endblock %}
