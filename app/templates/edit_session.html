{% extends "base.html" %}
{% block title %}Edit Session — Study Buddy{% endblock %}

{% block content %}
<div class="container" style="max-width:650px; margin:50px auto; padding-bottom:60px;">

  <div class="sb-card">

    <h1 class="page-title" style="margin-top:0;">
      Edit Study Session
    </h1>

    <form method="POST">

      <div class="mb-3">
        <label class="form-label fw-semibold">Session Name</label>

        <input
          type="text"
          class="form-control form-control-lg"
          name="name"
          value="{{ session.title }}"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Unit</label>

        <input
          type="text"
          class="form-control form-control-lg"
          name="unit"
          value="{{ session.unit }}"
          required>
      </div>

      <div class="row">

        <div class="col-md-6 mb-3">

          <label class="form-label fw-semibold">Date</label>

          <input
            type="date"
            class="form-control form-control-lg"
            name="date"
            value="{{ session.date }}">
        </div>

        <div class="col-md-6 mb-3">

          <label class="form-label fw-semibold">Time</label>

          <input
            type="time"
            class="form-control form-control-lg"
            name="time"
            value="{{ session.time }}">
        </div>

      </div>

      <div class="mb-3">

        <label class="form-label fw-semibold">Location</label>

        <input
          type="text"
          class="form-control form-control-lg"
          name="location"
          value="{{ session.location }}">
      </div>

      <div class="mb-3">

        <label class="form-label fw-semibold">Study Mode</label>

        <select class="form-select form-select-lg" name="mode">

          <option {% if session.mode == "In Person" %}selected{% endif %}>
            In Person
          </option>

          <option {% if session.mode == "Online" %}selected{% endif %}>
            Online
          </option>

          <option {% if session.mode == "Hybrid" %}selected{% endif %}>
            Hybrid
          </option>

        </select>

      </div>

      <div class="mb-4">

        <label class="form-label fw-semibold">
          Max Participants
        </label>

        <input
          type="number"
          class="form-control form-control-lg"
          name="max_participants"
          value="{{ session.max_spots }}"
          min="2"
          max="20">

      </div>

      <div class="d-flex gap-3">

        <button
          type="submit"
          class="btn btn-warning px-4 py-2">

          <i class="bi bi-save me-2"></i>
          Save Changes

        </button>

        <a
          href="{{ url_for('main.sessions') }}"
          class="btn btn-outline-secondary px-4 py-2">

          Cancel

        </a>

      </div>

    </form>

  </div>

</div>
{% endblock %}
