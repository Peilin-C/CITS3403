<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Buddy Finder — Sign Up</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <!-- ── Navigation ── -->
  <nav class="navbar navbar-light bg-white border-bottom px-3">
    <a class="navbar-brand fw-bold" href="index.html">📚 Study Buddy Finder</a>
    <div class="d-flex align-items-center gap-2">
      <span id="nav-user" class="text-muted small"></span>
      <button class="btn btn-outline-danger btn-sm" id="logout-btn"
              style="display:none" onclick="doLogout()">Log Out</button>
    </div>
  </nav>

  <!-- ── Signup Card ── -->
  <main class="flex-grow-1 d-flex align-items-start justify-content-center pt-5">
    <div class="card shadow-sm border" style="max-width: 420px; width: 100%;">
      <div class="card-body p-4">
        <h2 class="card-title h4 mb-1">Create an account</h2>
        <p class="text-muted small mb-4">Join and find your study buddies</p>

        <!-- Alert banner -->
        <div id="signup-alert" class="alert d-none" role="alert"></div>

        <!-- Full Name -->
        <div class="mb-3">
          <label for="signup-name" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="signup-name"
                 placeholder="Jane Doe" oninput="clearFieldError(this)" />
          <div class="form-text text-danger mt-1 d-none" id="signup-name-msg"></div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="signup-email" class="form-label">Student Email</label>
          <input type="email" class="form-control" id="signup-email"
                 placeholder="you@university.edu" oninput="clearFieldError(this)" />
          <div class="form-text text-danger mt-1 d-none" id="signup-email-msg"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="signup-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="signup-password"
                 placeholder="Min 8 characters" oninput="onPasswordInput(this)" />
          <div class="form-text text-danger mt-1 d-none" id="signup-password-msg"></div>
          <!-- Password Strength Bar -->
          <div class="strength-bar-wrap mt-2" id="strength-wrap">
            <div class="strength-track">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <div class="strength-label text-muted" id="strength-label"></div>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label for="signup-confirm" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="signup-confirm"
                 placeholder="Re-enter your password" oninput="clearFieldError(this)" />
          <div class="form-text text-danger mt-1 d-none" id="signup-confirm-msg"></div>
        </div>

        <button class="btn btn-primary w-100 mt-1" onclick="doSignup()">Sign Up</button>

        <p class="text-center text-muted small mt-3 mb-0">
          Already have an account? <a href="login.html">Log in</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ── Password Strength ───────────────────────────────
    const strengthLabels = ['Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'];
    const strengthColors = ['#dc2626', '#f97316', '#eab308', '#22c55e', '#16a34a'];

    function getStrength(pw) {
      let score = 0;
      if (pw.length >= 8)          score++;
      if (pw.length >= 12)         score++;
      if (/[A-Z]/.test(pw))        score++;
      if (/[0-9]/.test(pw))        score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;                // 0-5
    }

    function onPasswordInput(el) {
      clearFieldError(el);
      const pw   = el.value;
      const wrap = document.getElementById('strength-wrap');

      if (!pw) {
        wrap.classList.remove('visible');
        return;
      }
      wrap.classList.add('visible');
      const score = Math.max(0, getStrength(pw) - 1);
      document.getElementById('strength-fill').style.width      = ((score + 1) / 5 * 100) + '%';
      document.getElementById('strength-fill').style.background = strengthColors[score];
      document.getElementById('strength-label').textContent     = strengthLabels[score];
    }

    // ── Signup ──────────────────────────────────────────
    function doSignup() {
      clearAlert('signup-alert');
      const nameEl    = document.getElementById('signup-name');
      const emailEl   = document.getElementById('signup-email');
      const passEl    = document.getElementById('signup-password');
      const confirmEl = document.getElementById('signup-confirm');
      let ok = true;

      // Name
      if (!nameEl.value.trim()) {
        setFieldError(nameEl, 'signup-name-msg', 'Name is required');
        ok = false;
      } else { setFieldOk(nameEl, 'signup-name-msg'); }

      // Email
      if (!emailEl.value.trim()) {
        setFieldError(emailEl, 'signup-email-msg', 'Email is required');
        ok = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        setFieldError(emailEl, 'signup-email-msg', 'Enter a valid email address');
        ok = false;
      } else { setFieldOk(emailEl, 'signup-email-msg'); }

      // Password
      if (!passEl.value) {
        setFieldError(passEl, 'signup-password-msg', 'Password is required');
        ok = false;
      } else if (passEl.value.length < 8) {
        setFieldError(passEl, 'signup-password-msg', 'Must be at least 8 characters');
        ok = false;
      } else { setFieldOk(passEl, 'signup-password-msg'); }

      // Confirm
      if (!confirmEl.value) {
        setFieldError(confirmEl, 'signup-confirm-msg', 'Please confirm your password');
        ok = false;
      } else if (confirmEl.value !== passEl.value) {
        setFieldError(confirmEl, 'signup-confirm-msg', 'Passwords do not match');
        ok = false;
      } else { setFieldOk(confirmEl, 'signup-confirm-msg'); }

      if (!ok) return;

      // TODO: replace with real backend registration
      showAlert('signup-alert', 'success', '✅ Account created! Redirecting to login...');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1200);
    }

    function doLogout() {
      document.getElementById('nav-user').textContent = '';
      document.getElementById('logout-btn').style.display = 'none';
    }

    // ── Shared helpers ──────────────────────────────────
    function showAlert(id, type, msg) {
      const el = document.getElementById(id);
      el.className = 'alert alert-' + type;
      el.textContent = msg;
    }

    function clearAlert(id) {
      const el = document.getElementById(id);
      el.className = 'alert d-none';
      el.textContent = '';
    }

    function setFieldError(inputEl, msgId, msg) {
      inputEl.classList.remove('is-valid');
      inputEl.classList.add('is-invalid');
      const m = document.getElementById(msgId);
      m.className = 'form-text text-danger mt-1';
      m.textContent = '⚠ ' + msg;
    }

    function setFieldOk(inputEl, msgId) {
      inputEl.classList.remove('is-invalid');
      inputEl.classList.add('is-valid');
      const m = document.getElementById(msgId);
      m.className = 'form-text text-success mt-1';
      m.textContent = '✓ Looks good';
    }

    function clearFieldError(inputEl) {
      inputEl.classList.remove('is-invalid', 'is-valid');
      const msgEl = inputEl.parentElement.querySelector('.form-text');
      if (msgEl) {
        msgEl.className = 'form-text text-danger mt-1 d-none';
        msgEl.textContent = '';
      }
    }
  </script>

</body>
</html>
