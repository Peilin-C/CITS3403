<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f3f5fb;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .navbar {
      background-color: #0d6efd;
      padding: 14px 32px;
    }

    .navbar-brand,
    .nav-link {
      color: white !important;
      font-weight: 500;
      text-decoration: none;
    }

    .navbar-brand {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .form-wrapper {
      max-width: 800px;
      margin: 50px auto;
    }

    .form-card {
      background: white;
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .form-title {
      font-size: 2.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      color: #212529;
    }

    .btn-save {
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-0">
      <a class="navbar-brand" href="#">Study Buddy</a>
      <div class="ms-auto d-flex gap-4">
        <a class="nav-link" href="#">Sessions</a>
        <a class="nav-link" href="#">Create Session</a>
        <a class="nav-link" href="#">Profile</a>
      </div>
    </div>
  </nav>

  <div class="form-wrapper">
    <div class="form-card">
      <h1 class="form-title">Edit Profile</h1>

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control form-control-lg" value="Aisha Khan">
      </div>

      <div class="mb-3">
        <label class="form-label">Degree / Year</label>
        <input type="text" class="form-control form-control-lg" value="Bachelor of Computer Science, Year 2">
      </div>

      <div class="mb-3">
        <label class="form-label">Units</label>
        <input type="text" class="form-control form-control-lg" value="CITS3403, CITS3002">
      </div>

      <div class="mb-3">
        <label class="form-label">Availability</label>
        <input type="text" class="form-control form-control-lg" value="Tuesday and Thursday afternoons">
      </div>

      <div class="mb-3">
        <label class="form-label">Study Preferences</label>
        <textarea class="form-control form-control-lg" rows="4">Prefers group study, in-person sessions, and exam revision meetups.</textarea>
      </div>

      <div class="mb-4">
        <label class="form-label">Open to Project Team</label>
        <select class="form-select form-select-lg">
          <option selected>Yes</option>
          <option>No</option>
        </select>
      </div>

      <button class="btn btn-primary btn-save">Save Changes</button>
    </div>
  </div>

</body>
</html>
