    <div class="collapse navbar-collapse" id="sbNav">
      <ul class="navbar-nav mx-auto gap-1" id="main-nav">
        <li class="nav-item"><a class="nav-link" href="browse_users.html"><i class="bi bi-people"></i>Browse Buddies</a></li>
        <li class="nav-item"><a class="nav-link" href="study_sessions.html"><i class="bi bi-calendar3"></i>Sessions</a></li>
        <li class="nav-item"><a class="nav-link" href="create_session.html"><i class="bi bi-plus-circle"></i>Create Session</a></li>

        <a class="btn-nav-signup" href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>
</nav>
<main>
  <div class="container" style="max-width:780px;margin:50px auto;padding-bottom:60px;">
    <div class="sb-card">
      <h1 class="page-title" style="margin-top:0;">Edit Profile</h1>
      <form method="POST" action="#">
        <div class="mb-3"><label class="form-label fw-semibold">Name</label><input type="text" class="form-control form-control-lg" name="name" value="Aisha Khan"/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Degree / Year</label><input type="text" class="form-control form-control-lg" name="degree" value="Bachelor of Computer Science, Year 2"/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Units</label><input type="text" class="form-control form-control-lg" name="units" value="CITS3403, CITS3002"/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Availability</label><input type="text" class="form-control form-control-lg" name="availability" value="Tuesday and Thursday afternoons"/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Study Preferences</label><textarea class="form-control form-control-lg" name="study_preferences" rows="4">Prefers group study, in-person sessions, and exam revision meetups.</textarea></div>
        <div class="mb-4"><label class="form-label fw-semibold">Open to Project Team</label><select class="form-select form-select-lg" name="open_to_team"><option value="yes" selected>Yes</option><option value="no">No</option></select></div>
        <div class="d-flex gap-3"><button type="submit" class="btn btn-primary px-4 py-2">Save Changes</button><a href="profile.html" class="btn btn-outline-secondary px-4 py-2">Cancel</a></div>
      </form>
    </div>
  </div>
